spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/patients/**

spring.cloud.gateway.server.webmvc.routes[1].id=provider-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://PROVIDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/doctors/**

spring.cloud.gateway.server.webmvc.routes[2].id=booking-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://BOOKING-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/appointments/**

spring.cloud.gateway.server.webmvc.routes[3].id=payment-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/bills/**

spring.cloud.gateway.server.webmvc.routes[4].id=auth-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/auth/**

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*